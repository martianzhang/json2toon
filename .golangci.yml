version: "2"

run:
  timeout: 5m
  go: '1.25'

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - revive
    - misspell
    - gocyclo
    - nakedret
    - unconvert
  settings:
    gocyclo:
      min-complexity: 30
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    paths:
      - vendor
      - node_modules
      - testdata
    rules:
      - path: _test\.go
        linters:
          - gocyclo
